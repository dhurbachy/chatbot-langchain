
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f11;--surface:#18181c;--surface2:#222228;--border:#2e2e38;
  --text:#f0f0f4;--muted:#7a7a90;--accent:#6c6ef7;--accent2:#8b5cf6;
  --user-bg:#1e1e4a;--user-border:#3a3a8c;
}
.chat-root{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:600px;display:flex;flex-direction:column;border-radius:14px;overflow:hidden;border:1px solid var(--border)}
.chat-header{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0}
.bot-avatar{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bot-avatar svg{width:16px;height:16px}
.header-info{flex:1}
.header-title{font-size:14px;font-weight:500;letter-spacing:-0.01em}
.header-sub{font-size:12px;color:var(--muted);margin-top:1px}
.status-dot{width:8px;height:8px;border-radius:50%;background:#3fcf8e;box-shadow:0 0 0 2px rgba(63,207,142,0.2)}
.chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-track{background:transparent}
.chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:10px;color:var(--muted);height:100%}
.empty-icon{width:40px;height:40px;border-radius:12px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.empty-text{font-size:13px;text-align:center;line-height:1.6;max-width:220px}
.msg-row{display:flex;gap:10px;align-items:flex-end;animation:fadeUp 0.2s ease}
.msg-row.user{flex-direction:row-reverse}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg-avatar{width:28px;height:28px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;font-family:'DM Mono',monospace}
.msg-avatar.bot{background:var(--surface2);border:1px solid var(--border);color:var(--accent)}
.msg-avatar.user{background:var(--user-bg);border:1px solid var(--user-border);color:#8888dd}
.bubble{padding:10px 14px;border-radius:12px;font-size:13.5px;line-height:1.6;max-width:72%;word-break:break-word}
.bubble.bot{background:var(--surface2);border:1px solid var(--border);border-bottom-left-radius:4px;color:var(--text)}
.bubble.user{background:var(--user-bg);border:1px solid var(--user-border);border-bottom-right-radius:4px;color:#c5c5f0}
.typing{display:flex;gap:4px;padding:12px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;border-bottom-left-radius:4px;width:52px}
.typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes blink{0%,80%,100%{opacity:0.3;transform:scale(1)}40%{opacity:1;transform:scale(1.1)}}
.chat-input-area{padding:14px 16px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}
.input-row{display:flex;gap:10px;align-items:flex-end}
.input-wrap{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;display:flex;align-items:center;padding:0 12px;transition:border-color 0.15s}
.input-wrap:focus-within{border-color:var(--accent)}
.msg-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-size:13.5px;font-family:'DM Sans',sans-serif;padding:10px 0;resize:none;line-height:1.5;max-height:120px}
.msg-input::placeholder{color:var(--muted)}
.send-btn{width:38px;height:38px;border-radius:9px;background:var(--accent);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity 0.15s,transform 0.1s;flex-shrink:0}
.send-btn:hover{opacity:0.88}
.send-btn:active{transform:scale(0.93)}
.send-btn svg{width:15px;height:15px}
.suggestions{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.suggestion{font-size:12px;color:var(--muted);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 11px;cursor:pointer;transition:border-color 0.15s,color 0.15s;font-family:'DM Sans',sans-serif}
.suggestion:hover{border-color:var(--accent);color:var(--text)}
.msg-time{font-size:10px;color:var(--muted);margin-top:4px;text-align:right;padding:0 2px}
.msg-time.bot-time{text-align:left}
</style>


<div class="chat-root" id="chat-root">
  <div class="chat-header">
    <div class="bot-avatar">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="8" cy="8" r="6.5" stroke="white" stroke-width="1.5"/>
        <path d="M5 8h6M8 5v6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="header-info">
      <div class="header-title">LangChain Assistant</div>
      <div class="header-sub">Powered by GPT-4 · RAG enabled</div>
    </div>
    <div class="status-dot" id="status-dot" title="Online"></div>
  </div>

  <div class="chat-messages" id="chat-box">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M3 10a7 7 0 1114 0 7 7 0 01-14 0z" stroke="#6c6ef7" stroke-width="1.5"/>
          <path d="M10 7v3l2 2" stroke="#6c6ef7" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="empty-text">Ask anything — I'm connected to your knowledge base and the web.</div>
    </div>
  </div>

  <div class="chat-input-area">
    <div class="suggestions">
      <button class="suggestion" onclick="useSuggestion(this)">Summarize my docs</button>
      <button class="suggestion" onclick="useSuggestion(this)">What can you do?</button>
      <button class="suggestion" onclick="useSuggestion(this)">Explain LangChain</button>
    </div>
    <div class="input-row">
      <div class="input-wrap">
        <textarea class="msg-input" id="user-input" rows="1" placeholder="Message LangChain Bot..."></textarea>
      </div>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 7.5L13 2L8.5 7.5L13 13L2 7.5Z" fill="white"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
const chatBox = document.getElementById('chat-box');
const input = document.getElementById('user-input');
const emptyState = document.getElementById('empty-state');

function now(){return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}

function clearEmpty(){if(emptyState&&emptyState.parentNode){emptyState.remove()}}

function appendMsg(role,text){
  clearEmpty();
  const row=document.createElement('div');
  row.className='msg-row '+role;
  const av=document.createElement('div');
  av.className='msg-avatar '+(role==='user'?'user':'bot');
  av.textContent=role==='user'?'U':'AI';
  const bw=document.createElement('div');
  const bub=document.createElement('div');
  bub.className='bubble '+(role==='user'?'user':'bot');
  bub.textContent=text;
  const t=document.createElement('div');
  t.className='msg-time '+(role==='user'?'':'bot-time');
  t.textContent=now();
  bw.appendChild(bub);bw.appendChild(t);
  row.appendChild(av);row.appendChild(bw);
  chatBox.appendChild(row);
  chatBox.scrollTop=chatBox.scrollHeight;
}

function showTyping(){
  clearEmpty();
  const row=document.createElement('div');
  row.className='msg-row';row.id='typing-row';
  const av=document.createElement('div');
  av.className='msg-avatar bot';av.textContent='AI';
  const d=document.createElement('div');
  d.className='typing';
  d.innerHTML='<span></span><span></span><span></span>';
  row.appendChild(av);row.appendChild(d);
  chatBox.appendChild(row);
  chatBox.scrollTop=chatBox.scrollHeight;
}
function removeTyping(){const t=document.getElementById('typing-row');if(t)t.remove()}

function useSuggestion(el){input.value=el.textContent;input.focus();el.parentElement.style.display='none';}

async function sendMessage(){
  const text=input.value.trim();
  if(!text)return;
  appendMsg('user',text);
  input.value='';input.style.height='auto';
  document.querySelector('.suggestions').style.display='none';
  showTyping();
  try{
    const res=await fetch('/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text})});
    const data=await res.json();
    removeTyping();
    appendMsg('bot',data.reply||data.error||'No response.');
  }catch(e){
    removeTyping();
    appendMsg('bot','Error: Could not reach the server. Make sure the backend is running.');
  }
}

input.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
});
input.addEventListener('input',()=>{
  input.style.height='auto';
  input.style.height=Math.min(input.scrollHeight,120)+'px';
});
</script>
