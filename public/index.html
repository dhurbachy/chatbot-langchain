
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangChain Bot</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white h-screen flex flex-col">
    <div class="flex-1 overflow-y-auto p-6 space-y-4" id="chat-box">
        <div class="text-gray-400 text-center">Start a conversation...</div>
    </div>

    <div class="p-4 bg-gray-800 border-t border-gray-700">
        <div class="max-w-4xl mx-auto flex gap-4">
            <input type="text" id="user-input" class="flex-1 bg-gray-700 p-3 rounded-lg outline-none" placeholder="Type a message...">
            <button onclick="sendMessage()" class="bg-blue-600 px-6 py-2 rounded-lg font-bold">Send</button>
        </div>
    </div>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');

        function appendMessage(role, text) {
            const msg = document.createElement('div');
            msg.className = `p-4 rounded-lg ${role === 'user' ? 'bg-blue-900 ml-auto' : 'bg-gray-700'} max-w-[80%]`;
            msg.innerText = text;
            chatBox.appendChild(msg);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value;
            if (!text) return;

            appendMessage('user', text);
            userInput.value = '';

            const response = await fetch('/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            
            const data = await response.json();
            appendMessage('bot', data.reply || data.error);
        }

        userInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage() });
    </script>
</body>
</html>
